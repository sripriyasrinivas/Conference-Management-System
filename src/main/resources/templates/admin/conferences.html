<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Conferences | CMS Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-university"></i> Conference Management</h2>
    </div>
    <div class="grid-2">
        <!-- Create Form -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-plus"></i> Create Conference</h3></div>
            <div class="card-body">
                <form th:action="@{/admin/conferences/create}" method="post">
                    <div class="form-group">
                        <label>Conference Name *</label>
                        <input type="text" name="name" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Venue</label>
                        <input type="text" name="venue" class="form-control"/>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" name="startDate" class="form-control"/>
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" name="endDate" class="form-control"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Submission Deadline</label>
                            <input type="date" name="submissionDeadline" class="form-control"/>
                        </div>
                        <div class="form-group">
                            <label>Review Deadline</label>
                            <input type="date" name="reviewDeadline" class="form-control"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Notification Date</label>
                            <input type="date" name="notificationDate" class="form-control"/>
                        </div>
                        <div class="form-group">
                            <label>Max Attendees</label>
                            <input type="number" name="maxAttendees" class="form-control" value="300"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Contact Email</label>
                        <input type="email" name="contactEmail" class="form-control"/>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-plus"></i> Create Conference
                    </button>
                </form>
            </div>
        </div>

        <!-- List -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-list"></i> All Conferences</h3></div>
            <div class="card-body scroll-box">
                <div th:each="conf : ${conferences}" class="conference-item">
                    <div class="conference-item-header">
                        <strong th:text="${conf.name}"></strong>
                        <span th:class="'badge badge-conf-' + ${conf.status.name().toLowerCase()}"
                              th:text="${conf.status}"></span>
                    </div>
                    <div class="conference-item-meta">
                        <span><i class="fas fa-map-marker-alt"></i> <span th:text="${conf.venue}"></span></span>
                        <span><i class="fas fa-calendar"></i>
                            <span th:text="${conf.startDate} + ' → ' + ${conf.endDate}"></span></span>
                        <span><i class="fas fa-users"></i>
                            <span th:text="${conf.registrations.size()} + '/' + ${conf.maxAttendees}"></span>
                        </span>
                    </div>
                    <div class="conference-item-actions">
                        <a th:href="@{/admin/conferences/{id}/edit(id=${conf.id})}"
                           class="btn btn-sm btn-secondary">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                        <form th:action="@{/admin/conferences/{id}/status(id=${conf.id})}"
                              method="post" style="display:inline-flex; gap:0.25rem; align-items:center">
                            <select name="status" class="form-control form-control-sm">
                                <option th:each="s : ${T(com.cms.model.Conference.ConferenceStatus).values()}"
                                        th:value="${s}" th:text="${s}"
                                        th:selected="${conf.status == s}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">
                                <i class="fas fa-sync"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(conferences)}" class="text-center text-muted">
                    No conferences yet.
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
