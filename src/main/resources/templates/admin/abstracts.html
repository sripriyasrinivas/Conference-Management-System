<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Abstracts | CMS Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-scroll"></i> Abstract Management</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>
    <div class="card">
        <table class="data-table">
            <thead>
                <tr><th>#</th><th>Title</th><th>Author</th><th>Status</th><th>Version</th><th>Submitted</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="abs : ${abstracts}">
                    <td th:text="${abs.id}"></td>
                    <td th:text="${abs.title}"></td>
                    <td th:text="${abs.author?.fullName}"></td>
                    <td>
                        <span th:class="'badge badge-abs-' + ${abs.status.name().toLowerCase()}"
                              th:text="${abs.status}"></span>
                    </td>
                    <td>v<span th:text="${abs.version}"></span></td>
                    <td th:text="${#temporals.format(abs.submittedAt,'dd MMM yyyy')}"></td>
                    <td>
                        <form th:action="@{/admin/abstracts/{id}/review(id=${abs.id})}"
                              method="post" style="display:inline-flex; gap:0.4rem; align-items:center; flex-wrap:wrap">
                            <select name="status" class="form-control form-control-sm" style="width:auto">
                                <option th:each="s : ${T(com.cms.model.Abstract.AbstractStatus).values()}"
                                        th:value="${s}" th:text="${s}"
                                        th:selected="${abs.status == s}"></option>
                            </select>
                            <input type="text" name="comments" class="form-control form-control-sm"
                                   placeholder="Comments..." style="width:160px"/>
                            <button type="submit" class="btn btn-sm btn-primary">
                                <i class="fas fa-save"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(abstracts)}">
                    <td colspan="7" class="text-center text-muted">No abstracts submitted yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
