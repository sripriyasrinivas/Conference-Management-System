<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Paper Detail | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">

    <div class="page-header">
        <div>
            <h2><i class="fas fa-file-alt"></i> Paper Detail</h2>
            <span th:class="'badge badge-status-' + ${paper.status.name().toLowerCase()}"
                  th:text="${paper.status.displayName}" style="font-size:1rem"></span>
        </div>
        <a th:href="@{/admin/papers}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="grid-2">
        <!-- Paper Info -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-info-circle"></i> Paper Information</h3></div>
            <div class="card-body">
                <div class="detail-row"><label>Title:</label><span th:text="${paper.title}"></span></div>
                <div class="detail-row"><label>Author:</label><span th:text="${paper.author?.fullName}"></span></div>
                <div class="detail-row"><label>Institution:</label><span th:text="${paper.author?.institution}"></span></div>
                <div class="detail-row"><label>Email:</label><span th:text="${paper.author?.email}"></span></div>
                <div class="detail-row"><label>Keywords:</label><span th:text="${paper.keywords}"></span></div>
                <div class="detail-row"><label>Version:</label><span th:text="'v' + ${paper.version}"></span></div>
                <div class="detail-row"><label>Submitted:</label>
                    <span th:text="${#temporals.format(paper.submittedAt,'dd MMM yyyy HH:mm')}"></span>
                </div>
                <div class="detail-row"><label>Average Score:</label>
                    <span th:text="${#numbers.formatDecimal(avgScore,1,1)} + ' / 10'"></span>
                </div>
                <div class="detail-row full">
                    <label>Abstract:</label>
                    <p class="abstract-text" th:text="${paper.abstractText}"></p>
                </div>
                <div th:if="${paper.revisionComments}" class="detail-row full">
                    <label>Admin Comments:</label>
                    <p class="abstract-text" th:text="${paper.revisionComments}"></p>
                </div>
            </div>
        </div>

        <!-- Actions Panel -->
        <div>
            <!-- Update Status -->
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-edit"></i> Update Status</h3></div>
                <div class="card-body">
                    <form th:action="@{/admin/papers/{id}/status(id=${paper.id})}" method="post">
                        <div class="form-group">
                            <label>New Status</label>
                            <select name="status" class="form-control">
                                <option th:each="s : ${T(com.cms.model.Paper.Status).values()}"
                                        th:value="${s}" th:text="${s.displayName}"
                                        th:selected="${paper.status == s}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Comments (optional)</label>
                            <textarea name="comments" class="form-control" rows="3"
                                      placeholder="e.g. revisions required..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-save"></i> Update Status
                        </button>
                    </form>
                </div>
            </div>

            <!-- Assign Reviewer -->
            <div class="card" style="margin-top:1rem">
                <div class="card-header"><h3><i class="fas fa-user-check"></i> Assign Reviewer</h3></div>
                <div class="card-body">
                    <form th:action="@{/admin/papers/{id}/assign-reviewer(id=${paper.id})}" method="post">
                        <div class="form-group">
                            <label>Select Reviewer</label>
                            <select name="reviewerId" class="form-control">
                                <option value="">Choose reviewer...</option>
                                <option th:each="r : ${reviewers}"
                                        th:value="${r.id}"
                                        th:text="${r.fullName + ' (' + r.institution + ')'}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-full">
                            <i class="fas fa-plus"></i> Assign Reviewer
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Reviews -->
    <div class="card" style="margin-top:1.5rem">
        <div class="card-header"><h3><i class="fas fa-comments"></i> Reviews (<span th:text="${reviews.size()}"></span>)</h3></div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(reviews)}" class="text-center text-muted">
                <i class="fas fa-inbox fa-2x"></i><p>No reviews assigned yet.</p>
            </div>
            <div th:each="review : ${reviews}" class="review-card">
                <div class="review-header">
                    <div>
                        <strong th:text="${review.reviewer?.fullName}"></strong>
                        <span class="text-muted" th:text="' — ' + ${review.reviewer?.institution}"></span>
                    </div>
                    <div class="review-meta">
                        <span th:if="${review.score != null}"
                              class="score-badge" th:text="${review.score} + '/10'"></span>
                        <span th:class="'badge badge-rec-' + ${review.recommendation.name().toLowerCase()}"
                              th:text="${review.recommendation}"></span>
                        <span th:class="'badge badge-status-' + ${review.status.name().toLowerCase()}"
                              th:text="${review.status}"></span>
                    </div>
                </div>
                <div th:if="${review.status.name() == 'SUBMITTED'}">
                    <div class="review-section" th:if="${review.strengthsComments}">
                        <label class="text-success"><i class="fas fa-plus-circle"></i> Strengths:</label>
                        <p th:text="${review.strengthsComments}"></p>
                    </div>
                    <div class="review-section" th:if="${review.weaknessComments}">
                        <label class="text-danger"><i class="fas fa-minus-circle"></i> Weaknesses:</label>
                        <p th:text="${review.weaknessComments}"></p>
                    </div>
                    <div class="review-section" th:if="${review.comments}">
                        <label><i class="fas fa-comment"></i> Comments:</label>
                        <p th:text="${review.comments}"></p>
                    </div>
                    <div class="text-muted small" th:text="'Submitted: ' + ${#temporals.format(review.submittedAt,'dd MMM yyyy')}"></div>
                </div>
                <div th:if="${review.status.name() != 'SUBMITTED'}" class="text-muted">
                    <i class="fas fa-clock"></i> Review pending submission.
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
