<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Edit Conference | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
  <div class="page-header">
    <h2><i class="fas fa-edit"></i> Edit Conference</h2>
    <a th:href="@{/admin/conferences}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Back
    </a>
  </div>
  <div class="card card-narrow">
    <div class="card-body">
      <form th:action="@{/admin/conferences/{id}/edit(id=${conference.id})}" method="post">
        <div class="form-group">
          <label>Conference Name *</label>
          <input type="text" name="name" class="form-control" th:value="${conference.name}" required/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" class="form-control" rows="3"
                    th:text="${conference.description}"></textarea>
        </div>
        <div class="form-group">
          <label>Venue</label>
          <input type="text" name="venue" class="form-control" th:value="${conference.venue}"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" name="startDate" class="form-control" th:value="${conference.startDate}"/>
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" name="endDate" class="form-control" th:value="${conference.endDate}"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Submission Deadline</label>
            <input type="date" name="submissionDeadline" class="form-control"
                   th:value="${conference.submissionDeadline}"/>
          </div>
          <div class="form-group">
            <label>Review Deadline</label>
            <input type="date" name="reviewDeadline" class="form-control"
                   th:value="${conference.reviewDeadline}"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Notification Date</label>
            <input type="date" name="notificationDate" class="form-control"
                   th:value="${conference.notificationDate}"/>
          </div>
          <div class="form-group">
            <label>Max Attendees</label>
            <input type="number" name="maxAttendees" class="form-control"
                   th:value="${conference.maxAttendees}"/>
          </div>
        </div>
        <div class="form-group">
          <label>Contact Email</label>
          <input type="email" name="contactEmail" class="form-control"
                 th:value="${conference.contactEmail}"/>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Changes
          </button>
          <a th:href="@{/admin/conferences}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
