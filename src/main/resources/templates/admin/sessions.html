<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Sessions | CMS Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-calendar-alt"></i> Session Management</h2>
    </div>

    <div class="grid-2">
        <!-- Create Session Form -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-plus"></i> Create New Session</h3></div>
            <div class="card-body">
                <form th:action="@{/admin/sessions/create}" method="post">
                    <div class="form-group">
                        <label>Session Title *</label>
                        <input type="text" name="title" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Track</label>
                            <input type="text" name="track" class="form-control" placeholder="e.g. AI & ML"/>
                        </div>
                        <div class="form-group">
                            <label>Room</label>
                            <input type="text" name="room" class="form-control" placeholder="e.g. Room A"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" name="sessionDate" class="form-control" required/>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select name="type" class="form-control">
                                <option th:each="t : ${T(com.cms.model.Session.SessionType).values()}"
                                        th:value="${t}" th:text="${t.displayName}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Time *</label>
                            <input type="time" name="startTime" class="form-control" required/>
                        </div>
                        <div class="form-group">
                            <label>End Time *</label>
                            <input type="time" name="endTime" class="form-control" required/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Speaker</label>
                            <select name="speakerId" class="form-control">
                                <option value="">None</option>
                                <option th:each="s : ${speakers}" th:value="${s.id}"
                                        th:text="${s.fullName}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Linked Paper</label>
                            <select name="paperId" class="form-control">
                                <option value="">None</option>
                                <option th:each="p : ${acceptedPapers}" th:value="${p.id}"
                                        th:text="${p.title}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Max Capacity</label>
                        <input type="number" name="maxCapacity" class="form-control" value="100"/>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-plus"></i> Create Session
                    </button>
                </form>
            </div>
        </div>

        <!-- Sessions List -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-list"></i> All Sessions</h3></div>
            <div class="card-body scroll-box">
                <div th:if="${#lists.isEmpty(sessions)}" class="text-center text-muted">
                    No sessions created yet.
                </div>
                <div th:each="session : ${sessions}" class="session-item">
                    <div class="session-item-header">
                        <strong th:text="${session.title}"></strong>
                        <span th:class="'badge badge-session-' + ${session.type.name().toLowerCase()}"
                              th:text="${session.type.displayName}"></span>
                    </div>
                    <div class="session-item-meta">
                        <span><i class="fas fa-calendar"></i>
                            <span th:text="${session.sessionDate}"></span></span>
                        <span><i class="fas fa-clock"></i>
                            <span th:text="${session.startTime + ' - ' + session.endTime}"></span></span>
                        <span th:if="${session.room}"><i class="fas fa-door-open"></i>
                            <span th:text="${session.room}"></span></span>
                        <span th:if="${session.speaker}"><i class="fas fa-microphone"></i>
                            <span th:text="${session.speaker.fullName}"></span></span>
                    </div>
                    <form th:action="@{/admin/sessions/{id}/delete(id=${session.id})}"
                          method="post" style="display:inline"
                          onsubmit="return confirm('Delete this session?')">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
