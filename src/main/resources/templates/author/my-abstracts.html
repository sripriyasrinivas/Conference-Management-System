<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Abstracts | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-scroll"></i> My Abstracts</h2>
        <a th:href="@{/author/abstracts/submit}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Submit New
        </a>
    </div>
    <div th:if="${#lists.isEmpty(abstracts)}" class="empty-state">
        <i class="fas fa-file-medical fa-3x text-muted"></i>
        <p>No abstracts submitted yet.</p>
        <a th:href="@{/author/abstracts/submit}" class="btn btn-primary">Submit Abstract</a>
    </div>
    <div th:each="abs : ${abstracts}" class="card abstract-card">
        <div class="abstract-card-header">
            <div>
                <h4 th:text="${abs.title}"></h4>
                <small class="text-muted">v<span th:text="${abs.version}"></span> &bull;
                    Submitted <span th:text="${#temporals.format(abs.submittedAt,'dd MMM yyyy')}"></span>
                </small>
            </div>
            <span th:class="'badge badge-abs-' + ${abs.status.name().toLowerCase()}"
                  th:text="${abs.status}"></span>
        </div>
        <p class="abstract-preview" th:text="${#strings.abbreviate(abs.content, 200)}"></p>
        <div th:if="${abs.reviewComments}" class="review-comments-box">
            <label><i class="fas fa-comment-alt"></i> Reviewer Comments:</label>
            <p th:text="${abs.reviewComments}"></p>
        </div>
        <div class="abstract-card-footer">
            <span class="text-muted small"><i class="fas fa-tags"></i> <span th:text="${abs.keywords}"></span></span>
            <a th:if="${abs.status.name() == 'REVISION_REQUESTED'}"
               th:href="@{/author/abstracts/{id}/revise(id=${abs.id})}"
               class="btn btn-sm btn-warning">
                <i class="fas fa-edit"></i> Revise
            </a>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
