<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Revise Paper | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
  <div class="page-header">
    <h2><i class="fas fa-edit"></i> Revise Paper</h2>
    <a th:href="@{/author/papers/{id}(id=${paper.id})}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Back
    </a>
  </div>
  <div th:if="${paper.revisionComments}" class="alert alert-warning">
    <i class="fas fa-comment-alt"></i>
    <strong>Admin/Reviewer Comments:</strong> <span th:text="${paper.revisionComments}"></span>
  </div>
  <div class="card card-narrow">
    <div class="card-header"><h3>Update Submission (v<span th:text="${paper.version + 1}"></span>)</h3></div>
    <div class="card-body">
      <form th:action="@{/author/papers/{id}/revise(id=${paper.id})}" method="post" enctype="multipart/form-data">
        <div class="form-group">
          <label>Paper Title *</label>
          <input type="text" name="title" class="form-control" th:value="${paper.title}" required/>
        </div>
        <div class="form-group">
          <label>Abstract *</label>
          <textarea name="abstractText" class="form-control" rows="7" required
                    th:text="${paper.abstractText}"></textarea>
        </div>
        <div class="form-group">
          <label>Keywords</label>
          <input type="text" name="keywords" class="form-control" th:value="${paper.keywords}"/>
        </div>
        <div class="form-group">
          <label>Upload Revised Paper (optional)</label>
          <div class="file-upload-area">
            <input type="file" name="file" id="fileInput" accept=".pdf,.doc,.docx" class="file-input"/>
            <label for="fileInput" class="file-upload-label">
              <i class="fas fa-cloud-upload-alt"></i>
              <span th:text="${paper.fileName != null ? 'Current: ' + paper.fileName : 'Click to upload revised version'}"></span>
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane"></i> Resubmit Revision
          </button>
          <a th:href="@{/author/papers/{id}(id=${paper.id})}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
