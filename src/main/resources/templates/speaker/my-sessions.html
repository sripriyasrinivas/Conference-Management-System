<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Sessions | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
  <div class="page-header">
    <h2><i class="fas fa-microphone"></i> My Sessions</h2>
    <a th:href="@{/speaker/dashboard}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Dashboard
    </a>
  </div>
  <div th:if="${#lists.isEmpty(sessions)}" class="empty-state">
    <i class="fas fa-calendar-times fa-3x text-muted"></i>
    <p>No sessions assigned to you yet.</p>
  </div>
  <div th:each="session : ${sessions}" class="card session-card" style="margin-bottom:1rem">
    <div class="session-card-header">
      <div>
        <h4 th:text="${session.title}"></h4>
        <span th:class="'badge badge-session-' + ${session.type.name().toLowerCase()}"
              th:text="${session.type.displayName}"></span>
        <span th:if="${session.track}" class="badge badge-track" th:text="${session.track}"></span>
      </div>
      <a th:href="@{/speaker/sessions/{id}(id=${session.id})}" class="btn btn-sm btn-primary">
        <i class="fas fa-eye"></i> View Details
      </a>
    </div>
    <div class="session-meta">
      <span><i class="fas fa-calendar"></i> <span th:text="${session.sessionDate}"></span></span>
      <span><i class="fas fa-clock"></i> <span th:text="${session.startTime} + ' – ' + ${session.endTime}"></span></span>
      <span th:if="${session.room}"><i class="fas fa-door-open"></i> <span th:text="${session.room}"></span></span>
      <span><i class="fas fa-users"></i> Capacity: <span th:text="${session.maxCapacity}"></span></span>
    </div>
  </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
