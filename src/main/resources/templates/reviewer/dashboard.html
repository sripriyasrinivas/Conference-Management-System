<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Reviewer Dashboard | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-search"></i> Reviewer Dashboard</h2>
        <p class="text-muted">Welcome, <span th:text="${reviewer.fullName}"></span></p>
    </div>

    <div class="stats-grid">
        <div class="stat-card stat-blue">
            <div class="stat-icon"><i class="fas fa-tasks"></i></div>
            <div class="stat-info">
                <div class="stat-value" th:text="${allReviews.size()}">0</div>
                <div class="stat-label">Assigned Reviews</div>
            </div>
        </div>
        <div class="stat-card stat-orange">
            <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
            <div class="stat-info">
                <div class="stat-value" th:text="${pendingReviews.size()}">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        <div class="stat-card stat-green">
            <div class="stat-icon"><i class="fas fa-check-double"></i></div>
            <div class="stat-info">
                <div class="stat-value" th:text="${completedCount}">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
    </div>

    <!-- Pending Reviews -->
    <div class="section-title"><h3><i class="fas fa-clock"></i> Pending Reviews</h3></div>
    <div th:if="${#lists.isEmpty(pendingReviews)}" class="empty-state">
        <i class="fas fa-check-circle fa-3x text-success"></i>
        <p>All caught up! No pending reviews.</p>
    </div>
    <div th:each="review : ${pendingReviews}" class="card review-assignment-card">
        <div class="review-assignment-header">
            <div>
                <h4 th:text="${review.paper.title}"></h4>
                <p class="text-muted">by <span th:text="${review.paper.author?.institution}"></span></p>
            </div>
            <a th:href="@{/reviewer/reviews/{id}(id=${review.id})}" class="btn btn-primary">
                <i class="fas fa-pen"></i> Start Review
            </a>
        </div>
        <p class="abstract-preview" th:text="${#strings.abbreviate(review.paper.abstractText, 180)}"></p>
        <div class="review-meta-row">
            <span class="text-muted small"><i class="fas fa-tags"></i> <span th:text="${review.paper.keywords}"></span></span>
            <span th:if="${review.deadline}" class="deadline-badge">
                <i class="fas fa-calendar-times"></i>
                Due: <span th:text="${#temporals.format(review.deadline,'dd MMM yyyy')}"></span>
            </span>
        </div>
    </div>

    <!-- Completed Reviews -->
    <div class="section-title" style="margin-top:1.5rem"><h3><i class="fas fa-check"></i> Completed Reviews</h3></div>
    <div class="card">
        <table class="data-table">
            <thead><tr><th>Paper</th><th>Score</th><th>Recommendation</th><th>Submitted</th></tr></thead>
            <tbody>
                <tr th:each="review : ${allReviews}" th:if="${review.status.name() == 'SUBMITTED'}">
                    <td th:text="${review.paper.title}"></td>
                    <td><span class="score-badge" th:text="${review.score} + '/10'"></span></td>
                    <td>
                        <span th:class="'badge badge-rec-' + ${review.recommendation.name().toLowerCase()}"
                              th:text="${review.recommendation}"></span>
                    </td>
                    <td th:text="${#temporals.format(review.submittedAt,'dd MMM yyyy')}"></td>
                </tr>
                <tr th:if="${completedCount == 0}">
                    <td colspan="4" class="text-center text-muted">No completed reviews yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
