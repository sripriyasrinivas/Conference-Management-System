<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error | CMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<main class="container main-content">
    <div class="empty-state" style="padding: 5rem 2rem;">
        <i class="fas fa-exclamation-triangle fa-4x" style="color: var(--danger); margin-bottom: 1.5rem;"></i>
        <h2 th:text="${errorType ?: 'Something went wrong'}">Error</h2>
        <p class="text-muted" th:text="${errorMessage ?: 'An unexpected error occurred. Please try again.'}">
            Error message
        </p>
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
            <a th:href="@{/}" class="btn btn-primary">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
</body>
</html>
