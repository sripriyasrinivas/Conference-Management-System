<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Certificates | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-certificate"></i> My Certificates</h2>
    </div>
    <div th:if="${#lists.isEmpty(certificates)}" class="empty-state">
        <i class="fas fa-certificate fa-3x text-muted"></i>
        <p>No certificates issued yet. Certificates will appear here after attending conferences.</p>
    </div>
    <div class="cert-grid">
        <div th:each="cert : ${certificates}" class="certificate-display">
            <div class="certificate-ribbon">CERTIFICATE</div>
            <div class="cert-header">
                <i class="fas fa-graduation-cap fa-3x"></i>
                <h3 th:text="${cert.type.title}"></h3>
            </div>
            <div class="cert-body">
                <p class="cert-recipient">This certifies that</p>
                <h2 th:text="${cert.recipient?.fullName}"></h2>
                <p class="cert-text">has successfully participated in</p>
                <h4 th:text="${cert.conference?.name}"></h4>
                <p class="cert-date"
                   th:text="${#temporals.format(cert.issuedAt,'dd MMMM yyyy')}"></p>
            </div>
            <div class="cert-footer">
                <code th:text="${cert.certificateNumber}"></code>
                <p class="cert-verify">Certificate Number</p>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
