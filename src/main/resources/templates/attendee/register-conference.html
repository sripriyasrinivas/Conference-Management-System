<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Register | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-ticket-alt"></i> Register for Conference</h2>
        <a th:href="@{/attendee/conferences}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
    <div class="card card-narrow">
        <!-- Conference Summary -->
        <div class="conf-summary">
            <h3 th:text="${conference.name}"></h3>
            <div class="conf-summary-details">
                <span><i class="fas fa-map-marker-alt"></i> <span th:text="${conference.venue}"></span></span>
                <span><i class="fas fa-calendar"></i>
                    <span th:text="${conference.startDate} + ' → ' + ${conference.endDate}"></span></span>
                <span><i class="fas fa-users"></i>
                    <span th:text="${conference.registrations.size()} + ' / ' + ${conference.maxAttendees}"></span>
                </span>
            </div>
        </div>
        <div class="card-body">
            <form th:action="@{/attendee/conferences/{id}/register(id=${conference.id})}" method="post">
                <div class="form-group">
                    <label>Registration Type *</label>
                    <select name="type" class="form-control" required>
                        <option value="">Select your registration type...</option>
                        <option th:each="t : ${types}" th:value="${t}"
                                th:text="${t}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dietary Preferences</label>
                    <input type="text" name="dietary" class="form-control"
                           placeholder="e.g. Vegetarian, Vegan, Gluten-free"/>
                </div>
                <div class="form-group">
                    <label>Special Requirements</label>
                    <textarea name="special" class="form-control" rows="2"
                              placeholder="Any accessibility needs or special requests..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i> Confirm Registration
                    </button>
                    <a th:href="@{/attendee/conferences}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
