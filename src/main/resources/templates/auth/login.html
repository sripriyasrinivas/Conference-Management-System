<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Conference Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-graduation-cap auth-icon"></i>
            <h1>ConferenceMS</h1>
            <p>Conference Management System</p>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
        </div>

        <div class="demo-accounts">
            <p class="demo-title">Demo Accounts</p>
            <div class="demo-grid">
                <div class="demo-item"><strong>admin</strong> / admin123 <span class="badge badge-admin">Admin</span></div>
                <div class="demo-item"><strong>alice</strong> / alice123 <span class="badge badge-author">Author</span></div>
                <div class="demo-item"><strong>carol</strong> / carol123 <span class="badge badge-reviewer">Reviewer</span></div>
                <div class="demo-item"><strong>eve</strong> / eve123 <span class="badge badge-speaker">Speaker</span></div>
                <div class="demo-item"><strong>grace</strong> / grace123 <span class="badge badge-attendee">Attendee</span></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
