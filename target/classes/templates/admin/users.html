<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Users | CMS Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-users-cog"></i> User Management</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
    <div class="card">
        <table class="data-table">
            <thead>
                <tr><th>#</th><th>Name</th><th>Username</th><th>Email</th>
                    <th>Role</th><th>Institution</th><th>Joined</th><th>Action</th></tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.fullName}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span th:class="'badge badge-role-' + ${user.role.name().toLowerCase()}"
                              th:text="${user.role}"></span>
                    </td>
                    <td th:text="${user.institution}"></td>
                    <td th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}"></td>
                    <td>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Delete this user?')">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
