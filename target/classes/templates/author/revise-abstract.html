<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Revise Abstract | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
  <div class="page-header">
    <h2><i class="fas fa-edit"></i> Revise Abstract</h2>
    <a th:href="@{/author/abstracts}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
  <div th:if="${abstract.reviewComments}" class="alert alert-warning">
    <i class="fas fa-comment-alt"></i>
    <strong>Review Comments:</strong> <span th:text="${abstract.reviewComments}"></span>
  </div>
  <div class="card card-narrow">
    <div class="card-header"><h3>Update Abstract (v<span th:text="${abstract.version + 1}"></span>)</h3></div>
    <div class="card-body">
      <form th:action="@{/author/abstracts/{id}/revise(id=${abstract.id})}" method="post">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" name="title" class="form-control" th:value="${abstract.title}" required/>
        </div>
        <div class="form-group">
          <label>Abstract Content *</label>
          <textarea name="content" class="form-control" rows="8" required
                    th:text="${abstract.content}"></textarea>
        </div>
        <div class="form-group">
          <label>Keywords</label>
          <input type="text" name="keywords" class="form-control" th:value="${abstract.keywords}"/>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane"></i> Resubmit Abstract
          </button>
          <a th:href="@{/author/abstracts}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
