<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Paper | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <div>
            <h2><i class="fas fa-file-alt"></i> <span th:text="${paper.title}"></span></h2>
            <span th:class="'badge badge-status-' + ${paper.status.name().toLowerCase()}"
                  th:text="${paper.status.displayName}" style="font-size:0.9rem"></span>
        </div>
        <a th:href="@{/author/papers}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="grid-2">
        <div class="card">
            <div class="card-header"><h3>Paper Info</h3></div>
            <div class="card-body">
                <div class="detail-row"><label>Status:</label>
                    <span th:class="'badge badge-status-' + ${paper.status.name().toLowerCase()}"
                          th:text="${paper.status.displayName}"></span>
                </div>
                <div class="detail-row"><label>Version:</label>
                    <span th:text="'v' + ${paper.version}"></span>
                </div>
                <div class="detail-row"><label>Submitted:</label>
                    <span th:text="${#temporals.format(paper.submittedAt,'dd MMM yyyy')}"></span>
                </div>
                <div class="detail-row"><label>Keywords:</label>
                    <span th:text="${paper.keywords}"></span>
                </div>
                <div th:if="${paper.fileName}" class="detail-row">
                    <label>File:</label>
                    <span><i class="fas fa-file-pdf text-danger"></i> <span th:text="${paper.fileName}"></span></span>
                </div>
                <div class="detail-row full">
                    <label>Abstract:</label>
                    <p class="abstract-text" th:text="${paper.abstractText}"></p>
                </div>
                <div th:if="${paper.revisionComments}" class="detail-row full">
                    <label class="text-warning"><i class="fas fa-comment-alt"></i> Admin Comments:</label>
                    <p class="abstract-text warning-box" th:text="${paper.revisionComments}"></p>
                </div>
            </div>
            <div class="card-footer" th:if="${paper.status.name() == 'REVISION_REQUIRED'}">
                <a th:href="@{/author/papers/{id}/revise(id=${paper.id})}" class="btn btn-warning btn-full">
                    <i class="fas fa-edit"></i> Submit Revision
                </a>
            </div>
        </div>

        <!-- Reviews -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-comments"></i> Reviews
                    <span class="badge badge-grey" th:text="${reviews.size()}"></span>
                </h3>
            </div>
            <div class="card-body">
                <div th:if="${avgScore > 0}" class="avg-score-display">
                    <span class="avg-score-label">Average Score</span>
                    <span class="avg-score-value" th:text="${#numbers.formatDecimal(avgScore,1,1)} + ' / 10'"></span>
                </div>
                <div th:if="${#lists.isEmpty(reviews)}" class="text-center text-muted">
                    <i class="fas fa-hourglass-half fa-2x"></i>
                    <p>Reviews are pending.</p>
                </div>
                <div th:each="review : ${reviews}" class="review-card">
                    <div class="review-header">
                        <strong>Anonymous Reviewer</strong>
                        <div>
                            <span th:if="${review.score != null}" class="score-badge"
                                  th:text="${review.score} + '/10'"></span>
                            <span th:class="'badge badge-rec-' + ${review.recommendation.name().toLowerCase()}"
                                  th:text="${review.recommendation}"></span>
                        </div>
                    </div>
                    <div th:if="${review.status.name() == 'SUBMITTED'}">
                        <div class="review-section" th:if="${review.strengthsComments}">
                            <label class="text-success"><i class="fas fa-plus-circle"></i> Strengths:</label>
                            <p th:text="${review.strengthsComments}"></p>
                        </div>
                        <div class="review-section" th:if="${review.weaknessComments}">
                            <label class="text-danger"><i class="fas fa-minus-circle"></i> Weaknesses:</label>
                            <p th:text="${review.weaknessComments}"></p>
                        </div>
                        <div class="review-section" th:if="${review.comments}">
                            <label><i class="fas fa-comment"></i> General Comments:</label>
                            <p th:text="${review.comments}"></p>
                        </div>
                    </div>
                    <div th:if="${review.status.name() != 'SUBMITTED'}" class="text-muted">
                        <i class="fas fa-clock"></i> Review in progress...
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
