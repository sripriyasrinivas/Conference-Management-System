<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Submit Paper | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-upload"></i> Submit Paper</h2>
        <a th:href="@{/author/dashboard}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>
    <div class="card card-narrow">
        <div class="card-header"><h3>Paper Details</h3></div>
        <div class="card-body">
            <form th:action="@{/author/papers/submit}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Paper Title *</label>
                    <input type="text" name="title" class="form-control"
                           placeholder="Enter full paper title" required/>
                </div>
                <div class="form-group">
                    <label>Abstract *</label>
                    <textarea name="abstractText" class="form-control" rows="6"
                              placeholder="Provide a concise summary of your paper (150-300 words)..."
                              required></textarea>
                </div>
                <div class="form-group">
                    <label>Keywords</label>
                    <input type="text" name="keywords" class="form-control"
                           placeholder="e.g. machine learning, neural networks, optimization"/>
                    <small class="form-text text-muted">Separate keywords with commas</small>
                </div>
                <div class="form-group">
                    <label>Upload Paper (PDF)</label>
                    <div class="file-upload-area">
                        <input type="file" name="file" id="fileInput"
                               accept=".pdf,.doc,.docx" class="file-input"/>
                        <label for="fileInput" class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Click to upload or drag &amp; drop</span>
                            <small>PDF, DOC, DOCX up to 10MB</small>
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Submit Paper
                    </button>
                    <a th:href="@{/author/dashboard}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
