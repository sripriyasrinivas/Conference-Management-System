<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Review Paper | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-pen-alt"></i> Review Paper</h2>
        <a th:href="@{/reviewer/dashboard}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="grid-2">
        <!-- Paper Details -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-file-alt"></i> Paper Details</h3></div>
            <div class="card-body">
                <h4 th:text="${paper.title}"></h4>
                <div class="detail-row"><label>Keywords:</label><span th:text="${paper.keywords}"></span></div>
                <div class="detail-row"><label>Version:</label><span th:text="'v' + ${paper.version}"></span></div>
                <div class="detail-row full">
                    <label>Abstract:</label>
                    <p class="abstract-text" th:text="${paper.abstractText}"></p>
                </div>
                <div th:if="${paper.fileName}" class="detail-row">
                    <label>File:</label>
                    <span><i class="fas fa-file-pdf text-danger"></i> <span th:text="${paper.fileName}"></span></span>
                </div>
            </div>
        </div>

        <!-- Review Form -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-star-half-alt"></i> Submit Review</h3>
                <span th:if="${review.status.name() == 'SUBMITTED'}" class="badge badge-green">Submitted</span>
            </div>
            <div class="card-body">
                <form th:if="${review.status.name() != 'SUBMITTED'}"
                      th:action="@{/reviewer/reviews/{id}/submit(id=${review.id})}" method="post">

                    <div class="form-group">
                        <label>Strengths <span class="text-muted">(what the paper does well)</span></label>
                        <textarea name="strengthsComments" class="form-control" rows="3"
                                  placeholder="Describe the strengths of this paper..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Weaknesses <span class="text-muted">(areas for improvement)</span></label>
                        <textarea name="weaknessComments" class="form-control" rows="3"
                                  placeholder="Describe areas that need improvement..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>General Comments</label>
                        <textarea name="comments" class="form-control" rows="4"
                                  placeholder="Any other comments for the author..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Score (1–10) *</label>
                            <input type="number" name="score" class="form-control"
                                   min="1" max="10" required placeholder="e.g. 7"/>
                        </div>
                        <div class="form-group">
                            <label>Recommendation *</label>
                            <select name="recommendation" class="form-control" required>
                                <option value="">Select...</option>
                                <option th:each="r : ${recommendations}"
                                        th:value="${r}" th:text="${r}"></option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full"
                            onclick="return confirm('Submit this review? You cannot edit it after submission.')">
                        <i class="fas fa-check"></i> Submit Review
                    </button>
                </form>

                <!-- Already submitted view -->
                <div th:if="${review.status.name() == 'SUBMITTED'}">
                    <div class="review-section">
                        <label class="text-success">Strengths:</label>
                        <p th:text="${review.strengthsComments}"></p>
                    </div>
                    <div class="review-section">
                        <label class="text-danger">Weaknesses:</label>
                        <p th:text="${review.weaknessComments}"></p>
                    </div>
                    <div class="review-section">
                        <label>Comments:</label>
                        <p th:text="${review.comments}"></p>
                    </div>
                    <div class="review-section">
                        <label>Score:</label>
                        <span class="score-badge" th:text="${review.score} + '/10'"></span>
                    </div>
                    <div class="review-section">
                        <label>Recommendation:</label>
                        <span th:class="'badge badge-rec-' + ${review.recommendation.name().toLowerCase()}"
                              th:text="${review.recommendation}"></span>
                    </div>
                    <div class="review-section text-muted small">
                        Submitted: <span th:text="${#temporals.format(review.submittedAt,'dd MMM yyyy HH:mm')}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
