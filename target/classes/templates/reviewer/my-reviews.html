<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Reviews | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
  <div class="page-header">
    <h2><i class="fas fa-tasks"></i> My Reviews</h2>
    <a th:href="@{/reviewer/dashboard}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Dashboard
    </a>
  </div>
  <div class="card">
    <table class="data-table">
      <thead>
        <tr><th>Paper Title</th><th>Author</th><th>Status</th><th>Score</th><th>Recommendation</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr th:each="review : ${reviews}">
          <td th:text="${review.paper.title}"></td>
          <td th:text="${review.paper.author?.fullName}"></td>
          <td>
            <span th:class="'badge badge-status-' + ${review.status.name().toLowerCase()}"
                  th:text="${review.status}"></span>
          </td>
          <td>
            <span th:if="${review.score != null}" class="score-badge"
                  th:text="${review.score} + '/10'"></span>
            <span th:if="${review.score == null}" class="text-muted">—</span>
          </td>
          <td>
            <span th:if="${review.recommendation.name() != 'PENDING'}"
                  th:class="'badge badge-rec-' + ${review.recommendation.name().toLowerCase()}"
                  th:text="${review.recommendation}"></span>
            <span th:if="${review.recommendation.name() == 'PENDING'}" class="text-muted">Pending</span>
          </td>
          <td>
            <a th:href="@{/reviewer/reviews/{id}(id=${review.id})}" class="btn btn-sm btn-primary">
              <i class="fas fa-eye"></i> View
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reviews)}">
          <td colspan="6" class="text-center text-muted">No reviews assigned yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
