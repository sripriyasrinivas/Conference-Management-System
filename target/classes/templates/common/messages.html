<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Messages | CMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{common/fragments :: navbar}"></th:block>
<div th:replace="~{common/fragments :: alerts}"></div>
<main class="container main-content">
    <div class="page-header">
        <h2><i class="fas fa-envelope"></i> Messages &amp; Networking</h2>
    </div>

    <div class="grid-2">
        <!-- Compose -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-pen"></i> New Message</h3></div>
            <div class="card-body">
                <form th:action="@{/messages/send}" method="post">
                    <div class="form-group">
                        <label>To</label>
                        <select name="receiverId" class="form-control" required>
                            <option value="">Select recipient...</option>
                            <option th:each="u : ${users}" th:value="${u.id}"
                                    th:text="${u.fullName + ' (' + u.role + ' – ' + u.institution + ')'}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" name="subject" class="form-control"
                               placeholder="Message subject..."/>
                    </div>
                    <div class="form-group">
                        <label>Message *</label>
                        <textarea name="content" class="form-control" rows="5"
                                  placeholder="Write your message..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </div>

        <!-- Inbox -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-inbox"></i> Inbox (<span th:text="${messages.size()}"></span>)</h3>
            </div>
            <div class="card-body scroll-box">
                <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted">
                    <i class="fas fa-inbox fa-2x"></i><p>No messages yet.</p>
                </div>
                <div th:each="msg : ${messages}" class="message-item">
                    <div class="message-item-header">
                        <div>
                            <strong th:text="${msg.sender?.fullName}"></strong>
                            <span class="badge badge-role-small"
                                  th:text="${msg.sender?.role}"></span>
                        </div>
                        <span class="text-muted small"
                              th:text="${#temporals.format(msg.sentAt,'dd MMM, HH:mm')}"></span>
                    </div>
                    <div th:if="${msg.subject}" class="message-subject">
                        <strong th:text="${msg.subject}"></strong>
                    </div>
                    <p class="message-preview" th:text="${#strings.abbreviate(msg.content, 120)}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Sent Messages -->
    <div class="card" style="margin-top:1.5rem">
        <div class="card-header">
            <h3><i class="fas fa-paper-plane"></i> Sent (<span th:text="${sentMessages.size()}"></span>)</h3>
        </div>
        <div class="card-body">
            <table class="data-table">
                <thead><tr><th>To</th><th>Subject</th><th>Preview</th><th>Sent</th></tr></thead>
                <tbody>
                    <tr th:each="msg : ${sentMessages}">
                        <td th:text="${msg.receiver?.fullName}"></td>
                        <td th:text="${msg.subject}"></td>
                        <td th:text="${#strings.abbreviate(msg.content, 80)}"></td>
                        <td th:text="${#temporals.format(msg.sentAt,'dd MMM yyyy')}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sentMessages)}">
                        <td colspan="4" class="text-center text-muted">No sent messages.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer class="footer"><p>&copy; 2026 Conference Management System</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
